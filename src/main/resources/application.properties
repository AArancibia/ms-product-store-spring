server.port=8020
server.servlet.context-path=/api
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=none

spring.sql.init.mode=never

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI}
spring.datasource.url=${SPRING_DATA_SOURCE_URL}
spring.datasource.username=${SPRING_DATA_SOURCE_USERNAME}
spring.datasource.password=${SPRING_DATA_SOURCE_PASSWORD}
paypay.api.key=${PAYPAY_API_KEY}
paypay.api.secretKey=${PAYPAY_API_SECRET_KEY}
paypay.api.merchantId=${PAYPAY_API_SECRET_MERCHANT_ID}
paypal.urlV1=${PAYPAY_API_URL_V1}
paypal.urlV2=${PAYPAY_API_URL_V2}
paypal.clientId=${PAYPAY_API_CLIENT_ID}
paypal.secret=${PAYPAY_API_SECRET}
keycloak.baseUrl=${KEYCLOAK_BASE_URL}
keycloak.realm=${KEYCLOAK_REALM}

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.locations=classpath:db/migrations
spring.flyway.validate-on-migrate=${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}